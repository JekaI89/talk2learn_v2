<!-- PRACTICE -->
<div id="page-practice" class="page">
  <div class="page-container" style="display:flex;flex-direction:column;gap:24px">
    <button onclick="showPage('practice-mode')" style="background:none;border:none;cursor:pointer;padding:8px;border-radius:10px;display:flex;align-items:center;gap:6px;color:#737686;font-size:13px;transition:background 0.15s;align-self:flex-start" onmouseenter="this.style.background='#f0f2f5'" onmouseleave="this.style.background='none'">
      <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Назад
    </button>
    <div id="practice-content"></div>
  </div>
</div>
