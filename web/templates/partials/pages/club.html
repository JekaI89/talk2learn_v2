<!-- CLUB -->
<div id="page-club" class="page" style="position:relative;flex-direction:column;width:100%;max-width:720px;margin:0 auto">

  <!-- Chat header -->
  <div id="club-header" style="padding:14px 16px 12px;border-bottom:1px solid rgba(195,198,215,0.3);flex-shrink:0;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#4f65ef,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span class="material-symbols-outlined filled" style="color:#fff;font-size:20px">mic</span>
      </div>
      <div>
        <div style="font-size:15px;font-weight:700;color:#191c1e" data-i18n="nav_club">Разговорный клуб</div>
        <div style="font-size:12px;color:#737686">Уровень: <span id="club-level" style="color:#4f65ef;font-weight:700">A1</span> · AI-репетитор</div>
      </div>
    </div>
    <button onclick="initClubGreeting()" title="Начать заново"
      style="width:36px;height:36px;border-radius:10px;border:none;background:#f0f2f5;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s"
      onmouseenter="this.style.background='#e0e3e8'" onmouseleave="this.style.background='#f0f2f5'">
      <span class="material-symbols-outlined" style="font-size:18px;color:#737686">refresh</span>
    </button>
  </div>

  <!-- Messages -->
  <div id="chat-box" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;padding-bottom:90px"></div>

  <!-- Input bar -->
  <div id="club-input-bar" style="
    position:sticky;bottom:0;
    background:rgba(255,255,255,0.97);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-top:1px solid rgba(195,198,215,0.3);
    padding:10px 12px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom, 0px));
    display:flex;align-items:flex-end;gap:8px;
    flex-shrink:0;
    box-shadow:0 -4px 20px rgba(0,0,0,0.06);
    z-index:10;
  ">
    <!-- Textarea -->
    <div style="flex:1;position:relative">
      <textarea id="chat-input"
        placeholder="Напишите сообщение..." data-i18n-placeholder="placeholder_club"
        rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendClubMessage();}"
        oninput="autoResizeClubInput(this)"
        style="
          width:100%;resize:none;overflow:hidden;
          border:1.5px solid rgba(195,198,215,0.5);
          border-radius:20px;
          padding:10px 16px;
          font-size:14px;font-family:inherit;
          color:#191c1e;background:#f7f9fb;
          outline:none;
          line-height:1.4;
          max-height:120px;overflow-y:auto;
          transition:border-color 0.15s,background 0.15s;
          box-sizing:border-box;display:block;
        "
        onfocus="this.style.borderColor='#4f65ef';this.style.background='#fff'"
        onblur="this.style.borderColor='rgba(195,198,215,0.5)';this.style.background='#f7f9fb'">
      </textarea>
    </div>

    <!-- Mic button -->
    <button id="club-mic-btn"
      ontouchstart="startClubRecording(event)" ontouchend="stopClubRecording(event)"
      onmousedown="startClubRecording(event)" onmouseup="stopClubRecording(event)"
      style="
        width:44px;height:44px;flex-shrink:0;
        border-radius:50%;border:none;cursor:pointer;
        background:#f0f2f5;
        display:flex;align-items:center;justify-content:center;
        transition:all 0.15s;
      "
      onmouseenter="this.style.background='#e0e3e8'" onmouseleave="if(!_clubRecording)this.style.background='#f0f2f5'">
      <span class="material-symbols-outlined filled" style="font-size:20px;color:#434655;transition:color 0.15s">mic</span>
    </button>

    <!-- Send button -->
    <button onclick="sendClubMessage()" id="club-send-btn"
      style="
        width:44px;height:44px;flex-shrink:0;
        border-radius:50%;border:none;cursor:pointer;
        background:linear-gradient(135deg,#4f65ef,#7c3aed);
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 10px rgba(79,101,239,0.35);
        transition:transform 0.15s,box-shadow 0.15s;
      "
      onmouseenter="this.style.transform='scale(1.06)';this.style.boxShadow='0 4px 16px rgba(79,101,239,0.5)'"
      onmouseleave="this.style.transform='';this.style.boxShadow='0 2px 10px rgba(79,101,239,0.35)'">
      <span class="material-symbols-outlined filled" style="font-size:20px;color:#fff">send</span>
    </button>
  </div>

</div>
