<!-- LEVELS -->
<div id="page-levels" class="page">
  <div class="page-container" style="display:flex;flex-direction:column;gap:24px">

    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="navTo('main')" style="background:none;border:none;cursor:pointer;padding:8px;border-radius:10px;display:flex;align-items:center;color:#737686;transition:background 0.15s" onmouseenter="this.style.background='#f0f2f5'" onmouseleave="this.style.background='none'">
        <span class="material-symbols-outlined" style="font-size:22px">arrow_back</span>
      </button>
      <div>
        <h2 style="font-size:clamp(18px,3vw,24px);font-weight:800;color:#191c1e;margin:0">Выберите уровень</h2>
        <p style="font-size:13px;color:#737686;margin:4px 0 0" id="levels-category-label">Выбран раздел: Уроки</p>
      </div>
    </div>

    <div id="levels-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px"></div>

  </div>
</div>
