<!-- PRACTICE MODE -->
<div id="page-practice-mode" class="page">
  <div class="page-container" style="display:flex;flex-direction:column;gap:24px">

    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="showPage('levels')" style="background:none;border:none;cursor:pointer;padding:8px;border-radius:10px;display:flex;align-items:center;color:#737686;transition:background 0.15s" onmouseenter="this.style.background='#f0f2f5'" onmouseleave="this.style.background='none'">
        <span class="material-symbols-outlined" style="font-size:22px">arrow_back</span>
      </button>
      <h2 style="font-size:clamp(18px,3vw,24px);font-weight:800;color:#191c1e;margin:0" data-i18n="page_practice_mode">Режим практики</h2>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <button onclick="startPracticeMode('multiple_choice')" class="elevated-card" style="border-radius:16px;padding:18px 20px;text-align:left;border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;width:100%" onmouseenter="this.style.transform='translateY(-2px)'" onmouseleave="this.style.transform=''">
        <div style="font-size:15px;font-weight:700;color:#191c1e;margin-bottom:4px" data-i18n="practice_mc">🎯 Тест с вариантами</div>
        <div style="font-size:12px;color:#737686" data-i18n="practice_mc_sub">Выберите правильный ответ из 4 вариантов</div>
      </button>
      <button onclick="startPracticeMode('sentence_builder')" class="elevated-card" style="border-radius:16px;padding:18px 20px;text-align:left;border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;width:100%" onmouseenter="this.style.transform='translateY(-2px)'" onmouseleave="this.style.transform=''">
        <div style="font-size:15px;font-weight:700;color:#191c1e;margin-bottom:4px" data-i18n="practice_sb">🧩 Конструктор предложений</div>
        <div style="font-size:12px;color:#737686" data-i18n="practice_sb_sub">Составьте фразу из слов</div>
      </button>
    </div>

  </div>
</div>
