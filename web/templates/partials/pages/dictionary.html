<!-- DICTIONARY -->
<div id="page-dictionary" class="page">
  <div class="page-container" style="display:flex;flex-direction:column;gap:20px">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h2 style="font-size:clamp(20px,3vw,26px);font-weight:800;color:#191c1e;margin:0 0 4px">📚 Визуальный словарь</h2>
        <p style="font-size:13px;color:#737686;margin:0">Изучайте слова по темам с карточками</p>
      </div>
    </div>

    <!-- Search -->
    <div style="position:relative">
      <span class="material-symbols-outlined" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9aa0b4;font-size:20px">search</span>
      <input id="vocab-search" type="text" placeholder="Поиск темы..." oninput="filterVocabTopics()"
        style="width:100%;padding:12px 16px 12px 44px;border:1.5px solid rgba(195,198,215,0.5);border-radius:14px;font-size:14px;color:#191c1e;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.05);outline:none;box-sizing:border-box;transition:border-color 0.15s"
        onfocus="this.style.borderColor='#4f65ef'" onblur="this.style.borderColor='rgba(195,198,215,0.5)'"/>
    </div>

    <!-- Level filters -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span style="font-size:12px;font-weight:600;color:#9aa0b4;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap">Уровень:</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="setVocabLevel(null)" data-lvl="all" class="vocab-lvl"
          style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#4f65ef;color:#fff;transition:all 0.15s">Все</button>
        <button onclick="setVocabLevel('A1')" data-lvl="A1" class="vocab-lvl"
          style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#f0f2f5;color:#737686;transition:all 0.15s">A1</button>
        <button onclick="setVocabLevel('A2')" data-lvl="A2" class="vocab-lvl"
          style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#f0f2f5;color:#737686;transition:all 0.15s">A2</button>
        <button onclick="setVocabLevel('B1')" data-lvl="B1" class="vocab-lvl"
          style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#f0f2f5;color:#737686;transition:all 0.15s">B1</button>
        <button onclick="setVocabLevel('B2')" data-lvl="B2" class="vocab-lvl"
          style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:#f0f2f5;color:#737686;transition:all 0.15s">B2</button>
      </div>
    </div>

    <!-- Topics grid -->
    <div id="vocab-topics-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px"></div>

  </div>
</div>

<!-- FLASHCARDS -->
<div id="page-flashcards" class="page p-md md:p-xl gap-md max-w-lg w-full mx-auto">
  <button onclick="navTo('dictionary')" class="flex items-center gap-xs text-sm text-outline hover:text-on-surface transition-colors font-label">
    <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> К темам
  </button>
  <div id="flashcard-content"></div>
</div>
