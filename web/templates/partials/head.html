<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talk2Learn — AI Language Tutor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&family=Hanken+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: {
      "surface": "#f7f9fb", "surface-dim": "#d8dadc", "surface-bright": "#f7f9fb",
      "surface-container-lowest": "#ffffff", "surface-container-low": "#f2f4f6",
      "surface-container": "#eceef0", "surface-container-high": "#e6e8ea",
      "surface-container-highest": "#e0e3e5", "on-surface": "#191c1e",
      "on-surface-variant": "#434655", "inverse-surface": "#2d3133",
      "inverse-on-surface": "#eff1f3", "outline": "#737686", "outline-variant": "#c3c6d7",
      "surface-tint": "#0053db", "primary": "#004ac6", "on-primary": "#ffffff",
      "primary-container": "#2563eb", "on-primary-container": "#eeefff",
      "inverse-primary": "#b4c5ff", "primary-fixed": "#dbe1ff", "primary-fixed-dim": "#b4c5ff",
      "on-primary-fixed": "#00174b", "on-primary-fixed-variant": "#003ea8",
      "secondary": "#9d4300", "on-secondary": "#ffffff", "secondary-container": "#fd761a",
      "on-secondary-container": "#5c2400", "tertiary": "#006329", "on-tertiary": "#ffffff",
      "tertiary-container": "#007f36", "on-tertiary-container": "#c7ffca",
      "error": "#ba1a1a", "on-error": "#ffffff", "error-container": "#ffdad6",
      "background": "#f7f9fb", "on-background": "#191c1e", "surface-variant": "#e0e3e5",
    },
    fontFamily: {
      "body": ["Be Vietnam Pro","sans-serif"], "headline": ["Plus Jakarta Sans","sans-serif"],
      "label": ["Hanken Grotesk","sans-serif"],
      "headline-lg": ["Plus Jakarta Sans","sans-serif"],
      "headline-md": ["Plus Jakarta Sans","sans-serif"],
      "label-caps": ["Hanken Grotesk","sans-serif"],
    },
    fontSize: {
      "display-hero": ["48px",{"lineHeight":"56px","letterSpacing":"-0.02em","fontWeight":"800"}],
      "headline-lg": ["32px",{"lineHeight":"40px","letterSpacing":"-0.01em","fontWeight":"800"}],
      "headline-lg-mobile": ["28px",{"lineHeight":"34px","fontWeight":"800"}],
      "headline-md": ["24px",{"lineHeight":"32px","fontWeight":"700"}],
      "body-lg": ["18px",{"lineHeight":"28px","fontWeight":"400"}],
      "body-base": ["16px",{"lineHeight":"24px","fontWeight":"400"}],
      "label-caps": ["12px",{"lineHeight":"16px","letterSpacing":"0.05em","fontWeight":"700"}],
      "caption": ["10px",{"lineHeight":"14px","fontWeight":"500"}],
    },
    spacing: {
      "xs":"4px","sm":"8px","md":"16px","lg":"24px","xl":"32px",
      "touch-target-min":"52px","gutter":"16px","margin-mobile":"16px",
    },
    borderRadius: {
      "sm":"0.25rem","DEFAULT":"0.5rem","md":"0.75rem","lg":"1rem","xl":"1.5rem","full":"9999px",
    },
  }}

<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; }
body { font-family: 'Be Vietnam Pro', sans-serif; background: #f0f2f5; overflow-x: hidden; margin: 0; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align: middle; line-height: 1; }
.filled { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

/* ── Screens & Pages ── */
.screen { display: none; }
.screen.active { display: flex; }
.page { display: none; }
.page.active { display: flex; flex-direction: column; }

/* ── Cards ── */
.glass-card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(224,227,229,0.8);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.elevated-card {
  background: #ffffff;
  border: 1px solid rgba(195,198,215,0.25);
  box-shadow: 0 1px 8px rgba(0,0,0,0.06), 0 0 0 1px rgba(195,198,215,0.15);
  transition: box-shadow 0.2s ease, transform 0.15s ease;
}
.elevated-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.1), 0 0 0 1px rgba(195,198,215,0.2);
}

/* ── App Layout ── */
#screen-app {
  min-height: 100vh;
  display: none;
  position: relative;
}
#screen-app.active {
  display: flex;
  flex-direction: row;
}

/* ── Sidebar ── */
.app-sidebar {
  width: 256px;
  min-width: 256px;
  background: #ffffff;
  border-right: 1px solid rgba(195,198,215,0.3);
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 30;
  display: flex;
  flex-direction: column;
  padding: 20px 12px;
  gap: 8px;
  overflow-y: auto;
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.app-sidebar.open { transform: translateX(0); }
@media (min-width: 768px) {
  .app-sidebar { transform: translateX(0); }
}

/* ── Sidebar overlay (mobile) ── */
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 29;
  backdrop-filter: blur(2px);
}
#sidebar-overlay.active { display: block; }

/* ── Main content ── */
.app-main {
  flex: 1;
  min-width: 0;
  margin-left: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
@media (min-width: 768px) {
  .app-main { margin-left: 256px; }
}

/* ── Mobile header ── */
.mobile-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 56px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(195,198,215,0.3);
  position: sticky;
  top: 0;
  z-index: 20;
}
@media (min-width: 768px) {
  .mobile-header { display: none; }
}

/* ── Page container ── */
.page-container {
  flex: 1;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}
@media (min-width: 768px) {
  .page-container { padding: 32px 32px 48px; }
}
@media (min-width: 1280px) {
  .page-container { padding: 40px 48px 48px; }
}

/* ── Dashboard grid ── */
.dashboard-hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 28px;
}
@media (min-width: 640px) {
  .dashboard-hero-grid { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 1024px) {
  .dashboard-hero-grid { grid-template-columns: 2fr 1fr; }
}

.dashboard-stats-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (min-width: 640px) {
  .dashboard-stats-col { grid-template-columns: 1fr; }
}

/* ── Category grid ── */
.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (min-width: 768px) {
  .category-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ── Interactive grid ── */
.interactive-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 640px) {
  .interactive-grid { grid-template-columns: 1fr 1fr; }
}

/* ── Nav buttons ── */
.nav-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: #434655;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  font-size: 14px;
  font-weight: 600;
  width: 100%;
  text-align: left;
}
.nav-btn:hover { background: rgba(195,198,215,0.2); }
.nav-btn.active-nav {
  background: rgba(79,101,239,0.1);
  color: #4f65ef;
}

/* ── Mobile bottom nav ── */
.mobile-bottom-nav {
  display: flex;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 25;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid rgba(195,198,215,0.3);
  padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
}
@media (min-width: 768px) { .mobile-bottom-nav { display: none; } }
.mob-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  border: none;
  background: transparent;
  cursor: pointer;
  color: #737686;
  transition: color 0.15s;
  font-size: 10px;
  font-weight: 600;
  border-radius: 8px;
}
.mob-nav-btn.active-nav { color: #4f65ef; }

/* ── Word popup ── */
#word-popup { transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.2s; }
#word-popup.hidden-popup { transform: translateY(100%); opacity: 0; pointer-events: none; }

/* ── Clickable words ── */
.clickable-word { cursor: pointer; border-bottom: 1.5px dashed rgba(37,99,235,0.4); border-radius: 4px; padding: 0 2px; transition: background 0.12s; }
.clickable-word:hover { background: rgba(219,225,255,0.35); }

/* ── Lesson tabs ── */
#page-lesson { height: calc(100dvh - 56px); overflow: hidden; }
@media (min-width: 768px) { #page-lesson { height: 100vh; } }
#lesson-tabs::-webkit-scrollbar { display: none; }
.lesson-tab-panel { box-sizing: border-box; }
#lesson-tab-practice { flex-direction: column; }
/* Hide tabs scrollbar Firefox */
#lesson-tabs { scrollbar-width: none; }

/* ── Mic pulse animation ── */
@keyframes micPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50%      { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}

/* ── Club page layout ── */
#page-club {
  height: calc(100dvh - 56px);
  overflow: hidden;
}
@media (min-width: 768px) {
  #page-club { height: calc(100vh - 0px); }
}
#chat-box {
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* ── Flashcard animations ── */
@keyframes slideOutLeft  { to { transform: translateX(-110%) rotate(-8deg); opacity: 0; } }
@keyframes slideOutRight { to { transform: translateX(110%) rotate(8deg); opacity: 0; } }
@keyframes slideInUp     { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
.card-exit-left  { animation: slideOutLeft  0.28s ease forwards; }
.card-exit-right { animation: slideOutRight 0.28s ease forwards; }
.card-enter      { animation: slideInUp 0.3s ease forwards; }

/* ── Section titles ── */
.section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #737686;
  margin-bottom: 12px;
}
</style>
</head>
<body class="text-on-surface">
